<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GameHub —Your wishlist of saved games">
    <title>Wishlist —GameHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header with Navigation Bar -->
    <header>
        <nav class="navbar">
            <a href="/home" class="logo">
                <span class="logo-icon"><i class="icon-gamepad"></i></span>
                <span>GAME</span>HUB
            </a>
            <div class="nav-links">
                <a href="/home">Home</a>
                <a href="/games">Games</a>
                <a href="/team">Team</a>
            </div>
            <div class="nav-search">
                <span class="search-icon"><i class="icon-search"></i></span>
                <input type="text" placeholder="Search games..." id="nav-search-input">
            </div>
            <div class="nav-actions">
                <a href="/wishlist" class="nav-icon-btn nav-icon-active" title="Wishlist"><i class="icon-heart"></i></a>
                <a href="/cart" class="nav-icon-btn" title="Cart"><i class="icon-cart"></i> <span class="cart-badge" id="cart-badge" style="display:none;"></span></a>
                <a href="/account" class="nav-icon-btn" title="Account" id="nav-user-btn"><i class="icon-user"></i></a>
                <a href="/admin/login" class="nav-admin-btn"><i class="icon-settings"></i> Admin</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container wishlist-page">
        <section>
            <h1><i class="icon-heart"></i> My Wishlist</h1>
            <p id="wishlist-summary" style="color: var(--text-secondary); margin-top: 0.5rem;">Loading...</p>
        </section>

        <section class="grid-3" id="wishlist-grid" style="margin-top: 2rem;">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="logo">GAMEHUB</div>
                <p>Your ultimate destination for the best games at the best prices.</p>
            </div>
            <div class="footer-links">
                <h4>Quick Links</h4>
                <a href="/home">Home</a>
                <a href="/games">Games</a>
                <a href="/team">Team</a>
                <a href="/admin/login">Admin</a>
            </div>
            <div class="footer-links">
                <h4>Connect</h4>
                <div class="footer-social">
                    <a href="#" title="Facebook">FB</a>
                    <a href="#" title="Twitter">TW</a>
                    <a href="#" title="Instagram">IG</a>
                    <a href="#" title="Discord">DC</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">&copy; 2026 GameHub. All rights reserved.</div>
    </footer>

    <script src="js/wishlist.js"></script>
</body>

</html>
