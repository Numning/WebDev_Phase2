<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GameHub —Administrator Login">
    <title>Admin Login —GameHub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <!-- Header with Navigation Bar -->
    <header>
        <nav class="navbar">
            <a href="/home" class="logo">
                <span class="logo-icon"><i class="icon-gamepad"></i></span>
                <span>GAME</span>HUB
            </a>
            <div class="nav-links">
                <a href="/home">Home</a>
                <a href="/games">Games</a>
                <a href="/team">Team</a>
            </div>
        </nav>
    </header>

    <!-- Main Content: Auth Card -->
    <main>
        <section class="auth-container">
            <div class="auth-card">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div class="logo"
                        style="justify-content: center; font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 800; color: #fff;">
                        <span class="logo-icon" style="width: 40px; height: 40px; font-size: 1.2rem;"><i class="icon-gamepad"></i></span>
                        <span>GAME</span>HUB
                    </div>
                </div>

                <h2>Welcome Back</h2>
                <p class="subtitle">Sign in to your admin dashboard</p>

                <div class="error-message" id="error-msg"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Enter your username"
                            required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password"
                            required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="logo">GAMEHUB</div>
                <p>Your ultimate destination for the best games at the best prices.</p>
            </div>
            <div class="footer-links">
                <h4>Quick Links</h4>
                <a href="/home">Home</a>
                <a href="/games">Games</a>
                <a href="/team">Team</a>
                <a href="/admin/login">Admin</a>
            </div>
            <div class="footer-links">
                <h4>Connect</h4>
                <div class="footer-social">
                    <a href="#" title="Facebook">FB</a>
                    <a href="#" title="Twitter">TW</a>
                    <a href="#" title="Instagram">IG</a>
                    <a href="#" title="Discord">DC</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">&copy; 2026 GameHub. All rights reserved.</div>
    </footer>

    <script src="/js/login.js"></script>
</body>

</html>
