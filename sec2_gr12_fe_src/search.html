<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search and browse our catalog of games by title, genre, and price range.">
    <title>Browse Games —GameHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header with Navigation Bar -->
    <header>
        <nav class="navbar">
            <a href="/home" class="logo">
                <span class="logo-icon"><i class="icon-gamepad"></i></span>
                <span>GAME</span>HUB
            </a>
            <div class="nav-links">
                <a href="/home">Home</a>
                <a href="/games" class="active">Games</a>
                <a href="/team">Team</a>
            </div>
            <div class="nav-search">
                <span class="search-icon"><i class="icon-search"></i></span>
                <input type="text" placeholder="Search games..." id="nav-search-input">
            </div>
            <div class="nav-actions">
                <a href="/wishlist" class="nav-icon-btn" title="Wishlist"><i class="icon-heart"></i></a>
                <a href="/cart" class="nav-icon-btn" title="Cart"><i class="icon-cart"></i> <span class="cart-badge" id="cart-badge" style="display:none;"></span></a>
                <a href="/account" class="nav-icon-btn" title="Account" id="nav-user-btn"><i class="icon-user"></i></a>
                <a href="/admin/login" class="nav-admin-btn"><i class="icon-settings"></i> Admin</a>
            </div>
        </nav>
    </header>

    <!-- Main Content: Search Layout -->
    <main class="container">
        <section class="search-layout">
            <!-- Sidebar Filters -->
            <aside class="search-sidebar">
                <h3><i class="icon-search"></i> Search Filters</h3>
                <form id="search-form">
                    <div class="form-group">
                        <label for="search-title">Game Title</label>
                        <input type="text" id="search-title" class="form-control" placeholder="Search by name...">
                    </div>
                    <div class="form-group">
                        <label for="search-genre">Genre</label>
                        <select id="search-genre" class="form-control">
                            <option value="">All Genres</option>
                            <option value="RPG">RPG</option>
                            <option value="Action">Action</option>
                            <option value="MMORPG">MMORPG</option>
                            <option value="Racing">Racing</option>
                            <option value="Puzzle">Puzzle</option>
                            <option value="Strategy">Strategy</option>
                            <option value="Adventure">Adventure</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Fighting">Fighting</option>
                            <option value="Survival">Survival</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="search-price">Price Range</label>
                        <select id="search-price" class="form-control">
                            <option value="">Any Price</option>
                            <option value="0-500">Under ฿500</option>
                            <option value="500-1000">฿500 —฿1,000</option>
                            <option value="1000-2000">฿1,000 —฿2,000</option>
                            <option value="2000-999990">฿2,000+</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Search</button>
                    <button type="button" class="btn btn-secondary" style="width:100%; margin-top: 0.5rem;"
                        id="clear-filters">Clear Filters</button>
                </form>
            </aside>

            <!-- Search Results -->
            <section class="search-results">
                <div class="search-results-header">
                    <h2>All Games</h2>
                    <span class="results-count" id="results-count">Loading...</span>
                </div>
                <div class="grid-3" id="results-grid">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="logo">GAMEHUB</div>
                <p>Your ultimate destination for the best games at the best prices.</p>
            </div>
            <div class="footer-links">
                <h4>Quick Links</h4>
                <a href="/home">Home</a>
                <a href="/games">Games</a>
                <a href="/team">Team</a>
                <a href="/admin/login">Admin</a>
            </div>
            <div class="footer-links">
                <h4>Connect</h4>
                <div class="footer-social">
                    <a href="#" title="Facebook">FB</a>
                    <a href="#" title="Twitter">TW</a>
                    <a href="#" title="Instagram">IG</a>
                    <a href="#" title="Discord">DC</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">&copy; 2026 GameHub. All rights reserved.</div>
    </footer>

    <script src="js/search.js"></script>
</body>

</html>
