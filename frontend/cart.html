<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GameHub — Your shopping cart">
    <title>Cart — GameHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header with Navigation Bar -->
    <header>
        <nav class="navbar">
            <a href="/home" class="logo">
                <span class="logo-icon">🎮</span>
                <span>GAME</span>HUB
            </a>
            <div class="nav-links">
                <a href="/home">Home</a>
                <a href="/games">Games</a>
                <a href="/team">Team</a>
            </div>
            <div class="nav-search">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Search games..." id="nav-search-input">
            </div>
            <div class="nav-actions">
                <a href="/wishlist" class="nav-icon-btn" title="Wishlist">♡</a>
                <a href="/cart" class="nav-icon-btn nav-icon-active" title="Cart">🛒 <span class="cart-badge" id="cart-badge"></span></a>
                <a href="/account" class="nav-icon-btn" title="Account" id="nav-user-btn">👤</a>
                <a href="/admin/login" class="nav-admin-btn">⚙ Admin</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container cart-page">
        <section class="cart-header-section">
            <h1>🛒 Shopping Cart</h1>
            <p id="cart-summary" style="color: var(--text-secondary); margin-top: 0.5rem;">Loading...</p>
        </section>

        <section class="cart-layout">
            <div class="cart-items" id="cart-items">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>
            <aside class="cart-sidebar" id="cart-sidebar">
                <div class="cart-totals">
                    <h3>Order Summary</h3>
                    <div class="cart-total-row">
                        <span>Subtotal</span>
                        <span id="cart-subtotal">฿0.00</span>
                    </div>
                    <div class="cart-total-row">
                        <span>Discount</span>
                        <span id="cart-discount" style="color: var(--accent-tertiary);">-฿0.00</span>
                    </div>
                    <hr style="border-color: var(--border-color); margin: 1rem 0;">
                    <div class="cart-total-row cart-total-final">
                        <span>Total</span>
                        <span id="cart-total">฿0.00</span>
                    </div>
                    <button class="btn btn-success" style="width:100%; margin-top: 1.5rem;" onclick="alert('Checkout successful! Thank you for your purchase.')">
                        Proceed to Checkout
                    </button>
                    <button class="btn btn-secondary" style="width:100%; margin-top: 0.5rem;" id="clear-cart-btn">
                        Clear Cart
                    </button>
                </div>
            </aside>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="logo">GAMEHUB</div>
                <p>Your ultimate destination for the best games at the best prices.</p>
            </div>
            <div class="footer-links">
                <h4>Quick Links</h4>
                <a href="/home">Home</a>
                <a href="/games">Games</a>
                <a href="/team">Team</a>
            </div>
        </div>
        <div class="footer-bottom">&copy; 2026 GameHub. All rights reserved.</div>
    </footer>

    <script src="js/cart.js"></script>
</body>

</html>
